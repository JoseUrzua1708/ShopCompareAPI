<style>

/* ============================= */
/* MODAL LOGOUT (AISLADO TOTAL) */
/* ============================= */

.logout-modal{
  display:none;
  position:fixed;
  inset:0;
  z-index:3000;
  backdrop-filter:blur(6px);
  background:rgba(0,0,0,0.45);
  justify-content:center;
  align-items:center;
  padding:20px;
}

.logout-modal.active{
  display:flex;
}

/* Caja */

.logout-box{
  background:#3c5367;
  color:#f1f1f1;
  padding:30px;
  border-radius:16px;
  width:100%;
  max-width:380px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,.35);
  transform:scale(.9);
  opacity:0;
  animation:logoutPop .25s forwards;
}

@keyframes logoutPop{
  to{
    transform:scale(1);
    opacity:1;
  }
}

/* texto */

.logout-box h3{
  margin-bottom:10px;
}

.logout-box p{
  font-size:14px;
  opacity:.9;
}

/* botones */

.logout-buttons{
  margin-top:22px;
  display:flex;
  justify-content:center;
  gap:10px;
}

/* IMPORTANTE: anulamos estilos globales */

.logout-buttons button,
.logout-buttons a{
  width:auto !important;
  padding:10px 20px !important;
  border-radius:8px !important;
  border:none;
  font-weight:600;
  cursor:pointer;
  text-decoration:none;
  display:inline-block;
  margin:0;
  box-shadow:none;
}

/* cancelar */

.logout-btn-cancel{
  background:#9e9e9e;
  color:#222;
}

.logout-btn-cancel:hover{
  background:#bdbdbd;
}

/* aceptar */

.logout-btn-accept{
  background:#e53935;
  color:white;
}

.logout-btn-accept:hover{
  background:#c62828;
}

/* evitar scroll */

body.logout-open{
  overflow:hidden;
}

</style>


<!-- MODAL -->
<div id="logoutModal" class="logout-modal">

    <div class="logout-box">

        <h3>¿Deseas cerrar sesión?</h3>

        <p>
            Si cierras sesión tendrás que volver a iniciar sesión.
        </p>

        <div class="logout-buttons">

            <button id="cancelLogout" class="logout-btn-cancel">
                Cancelar
            </button>

            <a href="{{ url_for('logout') }}" class="logout-btn-accept">
                Aceptar
            </a>

        </div>

    </div>

</div>


<script>

const logoutBtn = document.querySelector(".logout-btn");
const logoutModal = document.getElementById("logoutModal");
const cancelBtn = document.getElementById("cancelLogout");

if(logoutBtn){
logoutBtn.addEventListener("click",(e)=>{
    e.preventDefault();
    logoutModal.classList.add("active");
    document.body.classList.add("logout-open");
});
}

if(cancelBtn){
cancelBtn.addEventListener("click",()=>{
    logoutModal.classList.remove("active");
    document.body.classList.remove("logout-open");
});
}

window.addEventListener("click",(e)=>{
    if(e.target === logoutModal){
        logoutModal.classList.remove("active");
        document.body.classList.remove("logout-open");
    }
});

</script>
